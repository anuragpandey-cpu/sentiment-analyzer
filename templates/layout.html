<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{% block title %}SentimentAI — Advanced Feedback Analytics{% endblock %}</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --surface-hover: #F9FAFB;
  --border: #E5E7EB;
  --text-primary: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  
  --accent: #111827;
  --accent-hover: #374151;
  --accent-fg: #FFFFFF;
  
  --pos: #10B981;
  --pos-bg: #D1FAE5;
  --pos-fg: #047857;
  --neu: #F59E0B;
  --neu-bg: #FEF3C7;
  --neu-fg: #B45309;
  --neg: #EF4444;
  --neg-bg: #FEE2E2;
  --neg-fg: #B91C1C;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}
[data-theme="dark"] {
  --bg: #0A0A0A;
  --surface: #121212;
  --surface-hover: #1A1A1A;
  --border: #262626;
  --text-primary: #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-tertiary: #6B7280;
  
  --accent: #FFFFFF;
  --accent-hover: #E5E7EB;
  --accent-fg: #000000;
  
  --pos: #34D399;
  --pos-bg: rgba(16, 185, 129, 0.15);
  --pos-fg: #6EE7B7;
  --neu: #FBBF24;
  --neu-bg: rgba(245, 158, 11, 0.15);
  --neu-fg: #FCD34D;
  --neg: #F87171;
  --neg-bg: rgba(239, 68, 68, 0.15);
  --neg-fg: #FCA5A5;
  
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.5);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  transition: background-color 0.3s ease, color 0.3s ease;
  overflow-x: hidden;
}
nav {
  position: sticky; top: 0; z-index: 50;
  width: 100%; height: 64px;
  background-color: rgba(var(--bg), 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 6%; transition: all 0.3s ease;
}
.nav-left { display: flex; align-items: center; gap: 32px; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo svg { width: 24px; height: 24px; color: var(--text-primary); }
.logo-txt { font-weight: 800; font-size: 16px; color: var(--text-primary); letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 24px; }
.nav-links a {
  text-decoration: none; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.theme-toggle {
  background: none; border: none; cursor: pointer;
  color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%; transition: background 0.2s, color 0.2s;
}
.theme-toggle:hover { background: var(--surface-hover); color: var(--text-primary); }
.theme-toggle svg { width: 18px; height: 18px; }
.container { max-width: 1100px; margin: 0 auto; padding: 40px 6%; }
.bento-card {
  background-color: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}
.bento-card:hover { box-shadow: var(--shadow-md); border-color: var(--text-tertiary); }
.btn-primary {
  background: var(--accent); color: var(--accent-fg);
  border: none; border-radius: var(--radius-md);
  padding: 12px 20px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: transform 0.1s, opacity 0.2s;
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  text-decoration: none;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  background: var(--surface); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 12px 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-secondary:hover { background: var(--surface-hover); border-color: var(--text-secondary); }
footer {
  border-top: 1px solid var(--border); background: var(--surface);
  padding: 40px 6%; margin-top: 80px; text-align: center;
}
.f-txt { font-size: 13px; color: var(--text-tertiary); font-weight: 500;}
@media (max-width: 768px) {
  .nav-links { display: none; }
}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="/" class="logo">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="SentimentAI Logo" style="width: 28px; height: 28px; border-radius: 6px; object-fit: cover;">
      <span class="logo-txt">SentimentAI</span>
    </a>
    <div class="nav-links">
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">Analyzer</a>
      <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About Us</a>
      <a href="/contact" class="{% if request.path == '/contact' %}active{% endif %}">Contact</a>
    </div>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme">
      <svg id="moonIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" /></svg>
      <svg id="sunIcon" style="display:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
    </button>
    <a href="https://github.com/yourusername/sentiment-analyzer" target="_blank" class="btn-secondary" style="padding: 8px 16px; font-size:13px; text-decoration:none;">GitHub</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <p class="f-txt">© 2026 SentimentAI. Designed with minimal elegance.</p>
</footer>

<script>
const themeBtn = document.getElementById('themeBtn');
const moonIcon = document.getElementById('moonIcon');
const sunIcon = document.getElementById('sunIcon');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  if (theme === 'dark') {
    moonIcon.style.display = 'none';
    sunIcon.style.display = 'block';
  } else {
    moonIcon.style.display = 'block';
    sunIcon.style.display = 'none';
  }
}
const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
setTheme(savedTheme);
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'dark' ? 'light' : 'dark');
  window.dispatchEvent(new Event('themeChanged'));
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
  document.querySelectorAll('.bento-card, .header-sect, .stats-grid').forEach(el => el.setAttribute('data-aos', 'fade-up'));
  AOS.init({ once: true, duration: 800, offset: 50 });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
